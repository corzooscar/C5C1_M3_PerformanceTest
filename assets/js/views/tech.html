<section>
    <!-- Header -->
    <div class="page-header">
        <div>
            <h2><i class="bi bi-tools"></i> Panel de Técnico</h2>
            <p>Gestiona tus tickets asignados</p>
        </div>
        <button id="btnNuevoTicket" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuevo Ticket
        </button>
    </div>

    <!-- Stats -->
    <div class="stat-grid" id="techStats"></div>

    <!-- Lista -->
    <div class="section-title">
        <i class="bi bi-ticket-detailed"></i> Mis Tickets Asignados
        <span class="count" id="ticketsCount"></span>
    </div>
    <div class="cards-grid" id="techTicketsList">
        <div class="loading-state"><div class="spinner-lg"></div><p>Cargando tus tickets...</p></div>
    </div>
</section>

<!-- Modal: Crear/Editar Ticket Técnico -->
<div class="modal-overlay" id="techTicketModal">
    <div class="modal-box" style="max-width:560px">
        <div class="modal-header">
            <h5 id="techModalTitle"><i class="bi bi-ticket me-2"></i>Ticket</h5>
            <button class="modal-close" id="techModalClose">✕</button>
        </div>
        <div class="modal-body">
            <div id="techModalAlert" class="alert hidden"></div>
            <input type="hidden" id="techTicketId">
            <div class="row col-2-3">
                <div class="form-group">
                    <label class="form-label">Nombre del ticket *</label>
                    <input type="text" class="form-control" id="techTicketNombre" placeholder="Ej: Fallo en red">
                </div>
                <div class="form-group">
                    <label class="form-label">Tipo *</label>
                    <select class="form-select" id="techTicketTipo">
                        <option value="">Seleccionar...</option>
                        <option value="incidente">Incidente</option>
                        <option value="requerimiento">Requerimiento</option>
                        <option value="soporte">Soporte</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Descripción *</label>
                <textarea class="form-control" id="techTicketDescripcion" rows="3"
                    placeholder="Describe el problema..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Estado</label>
                <select class="form-select" id="techTicketEstado">
                    <option value="en proceso">En proceso</option>
                    <option value="asignado">Asignado</option>
                    <option value="solucionado">Solucionado</option>
                </select>
            </div>
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i>
                El ticket se asignará automáticamente a ti.
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="techModalCancelBtn">Cancelar</button>
            <button class="btn btn-primary" id="btnGuardarTechTicket">
                <i class="bi bi-check-lg"></i> Guardar
            </button>
        </div>
    </div>
</div>
