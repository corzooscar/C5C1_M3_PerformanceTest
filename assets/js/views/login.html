<div class="login-wrapper">
    <div class="login-card">
        <!-- Panel izquierdo decorativo -->
        <div class="login-panel-left">
            <div class="brand-icon"><i class="bi bi-calendar-check-fill"></i></div>
            <h2>RMS</h2>
            <p>Sistema de Gestión<br>de Reservaciones</p>
        </div>
        <!-- Panel derecho con el form -->
        <div class="login-panel-right">
            <h4>Bienvenido de nuevo</h4>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>

            <div id="loginAlert" class="alert hidden"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username"
                            placeholder="Ingresa tu usuario" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password"
                            placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
                        <span id="loginSpinner" class="spinner hidden"></span>
                        Iniciar Sesión
                    </button>
                </div>
            </form>

            <hr class="login-divider">
            <p class="login-footer">
                ¿No tienes cuenta?
                <a href="#" id="goToRegister">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
